gui:
  sidePanelWidth: 0.2  # narrow left panel so diffs get more horizontal room
  theme:
    activeBorderColor:
      - '#7E9CD8'  # crystalBlue - for active borders
      - bold
    inactiveBorderColor:
      - '#727169'  # fujiGray - for inactive borders
    optionsTextColor:
      - '#7E9CD8'  # crystalBlue - for option text highlights
    selectedLineBgColor:
      - '#363646'  # sumiInk3 - for selected line backgrounds
    cherryPickedCommitBgColor:
      - '#2A2A37'  # sumiInk2 - for cherry-picked commit backgrounds
    cherryPickedCommitFgColor:
      - '#7E9CD8'  # crystalBlue - for cherry-picked commit text
    unstagedChangesColor:
      - '#C34043'  # autumnRed - for unstaged changes
    defaultFgColor:
      - '#DCD7BA'  # fujiWhite - for default text
    searchingActiveBorderColor:
      - '#E6C384'  # carpYellow - for search highlights
  authorColors:
    '*': '#957FB8'  # oniViolet - for author names

# Diff pagers — cycle between them inside lazygit with `|`
# Note: staging individual lines always uses the builtin diff (pagers are bypassed there)
git:
  pagers:
    - name: delta  # default: syntax-highlighted side-by-side diffs
      # no --width: lazygit runs the pager in a pty sized to the diff panel and
      # delta detects that, so side-by-side fills the panel exactly (lazygit's
      # {{columnWidth}} placeholder is half-width, meant for ydiff — don't use it);
      # hunk-header box is replaced with a plain line-number header;
      # clickable lazygit-edit:// links need OSC8 terminal support + a URL handler
      pager: delta --dark --paging=never --line-numbers --side-by-side --hunk-header-decoration-style=omit --hunk-header-style='line-number syntax' --hyperlinks --hyperlinks-file-link-format='lazygit-edit://{path}:{line}'
      colorArg: always
    - name: difftastic  # structural, language-aware side-by-side diffs
      externalDiffCommand: difft --color=always
      colorArg: always
    - {}  # builtin diff (what line-staging uses)

